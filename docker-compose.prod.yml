services:
  # ─── Edge Router (nginx) ─────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./services/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Home Page ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
      args:
        UMAMI_APP_ID: ${UMAMI_APP_ID}
        UMAMI_HOST: ${UMAMI_HOST:-https://umami.engineerfamily.net}
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
    ports:
      - "8000:8000"
    networks:
      - web

  # ─── Streamlit ────────────────────────────────────────
  streamlit:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - UMAMI_HOST=${UMAMI_HOST:-https://umami.engineerfamily.net}
      - UMAMI_STREAMLIT_ID=${UMAMI_STREAMLIT_ID:-}
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - web

  # ─── Analytics (Umami – self-hosted, privacy-first) ───────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@analytics-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      analytics-db:
        condition: service_healthy
    networks:
      - web

  analytics-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - analytics_db:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nivi_content:
  analytics_db:
