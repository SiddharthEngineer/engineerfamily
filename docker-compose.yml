services:
  # ─── Edge Router (Caddy) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      - CADDY_ADMIN_HASH=${CADDY_ADMIN_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web
    profiles: ["prod"]

  # ─── Home Page ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: services/app/Dockerfile
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SIDDHARTH_SECRET_KEY}
    ports:
      - "8000:8000"
    networks:
      - web
    profiles: ["local", "prod"]

  # ─── Streamlit ────────────────────────────────────────
  streamlit:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ENABLE_CORS=false
    ports:
      - "127.0.0.1:8501:8501"
    networks:
      - web
    profiles: ["local", "prod"]

  # ─── Nivi (Bookstack CMS – writing) ───────────────────────────────────────────
  # bookstack:
  #   image: ghost:5-alpine
  #   restart: unless-stopped
  #   environment:
  #     - NODE_ENV=production
  #     - url=https://nivi.engineerfamily.net
  #     - database__client=sqlite3
  #     - database__connection__filename=/var/lib/ghost/content/data/ghost.db
  #     - mail__transport=SMTP
  #     - mail__options__host=${GHOST_SMTP_HOST}
  #     - mail__options__port=${GHOST_SMTP_PORT:-587}
  #     - mail__options__auth__user=${GHOST_SMTP_USER}
  #     - mail__options__auth__pass=${GHOST_SMTP_PASS}
  #   volumes:
  #     - nivi_content:/var/lib/ghost/content
  #   networks:
  #     - web
  #   profiles: ["prod", "preprod"]

  # ─── Analytics (Umami – self-hosted, privacy-first) ───────────────────────
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD}@analytics-db:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      analytics-db:
        condition: service_healthy
    networks:
      - web
    profiles: ["prod"]

  analytics-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - analytics_db:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["prod"]

networks:
  web:
    driver: bridge
    name: engineerfamily_web

volumes:
  nivi_content:
  analytics_db:
  caddy_data:
  caddy_config:
