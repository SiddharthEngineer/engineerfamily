name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-preprod"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - prod
          - preprod
      ref:
        description: "Branch or tag to deploy (e.g. main, v1.2.3, v1.2.3-preprod)"
        required: false

jobs:
  deploy:
    name: SSH deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            environment="${{ inputs.environment }}"
          elif [[ "${{ github.ref_name }}" =~ -preprod$ ]]; then
            environment="preprod"
          else
            environment="prod"
          fi

          echo "environment=$environment" >> "$GITHUB_OUTPUT"

      - name: Resolve target commit
        id: target
        run: |
          set -euo pipefail

          git fetch --prune --tags origin +refs/heads/*:refs/remotes/origin/*

          environment="${{ steps.env.outputs.environment }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            requested_ref='${{ inputs.ref }}'
            if [ -z "$requested_ref" ]; then
              echo "ERROR: 'ref' input is required for manual dispatch"
              exit 1
            fi
            event_mode='manual'
          else
            requested_ref='${{ github.ref_name }}'
            event_mode='tag_push'
          fi

          if [ "$event_mode" = 'tag_push' ]; then
            if [ "$environment" = "prod" ]; then
              if ! [[ "$requested_ref" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                echo "ERROR: tag '$requested_ref' does not match v<major>.<minor>.<patch>"
                exit 1
              fi
            else
              if ! [[ "$requested_ref" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-preprod$ ]]; then
                echo "ERROR: tag '$requested_ref' does not match v<major>.<minor>.<patch>-preprod"
                exit 1
              fi
            fi

            release_branch="release-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            tag_commit="$(git rev-parse "refs/tags/$requested_ref^{commit}")"

            if ! git show-ref --verify --quiet "refs/remotes/origin/$release_branch"; then
              echo "ERROR: release branch origin/$release_branch not found"
              exit 1
            fi

            if ! git merge-base --is-ancestor "$tag_commit" "refs/remotes/origin/$release_branch"; then
              echo "ERROR: tag '$requested_ref' is not reachable from origin/$release_branch"
              exit 1
            fi

            target_sha="$tag_commit"
          else
            if git show-ref --verify --quiet "refs/tags/$requested_ref"; then
              target_sha="$(git rev-parse "refs/tags/$requested_ref^{commit}")"
            elif git show-ref --verify --quiet "refs/remotes/origin/$requested_ref"; then
              target_sha="$(git rev-parse "refs/remotes/origin/$requested_ref^{commit}")"
            else
              echo "ERROR: '$requested_ref' is not a known tag or branch on origin"
              exit 1
            fi
          fi

          echo "requested_ref=$requested_ref" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Reset deployment branch
        env:
          BRANCH_RESET_TOKEN: ${{ secrets.BRANCH_RESET_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BRANCH_RESET_TOKEN:-}" ]; then
            echo "ERROR: Missing secret BRANCH_RESET_TOKEN"
            exit 1
          fi

          environment="${{ steps.env.outputs.environment }}"
          git push "https://x-access-token:${BRANCH_RESET_TOKEN}@github.com/${{ github.repository }}.git" \
            "${{ steps.target.outputs.target_sha }}:refs/heads/${environment}" --force

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build & restart containers
        run: |
          environment="${{ steps.env.outputs.environment }}"

          if [ "$environment" = "prod" ]; then
            repo_dir="/srv/engineerfamily"
            compose_cmd="docker compose -f docker-compose.prod.yml"
            nginx_container="engineerfamily-nginx-1"
          else
            repo_dir="/srv/engineerfamily-preprod"
            compose_cmd="docker compose -f docker-compose.prod.yml -f docker-compose.preprod.yml"
            nginx_container="engineerfamily-nginx-preprod-1"
          fi

          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << EOF
            set -euo pipefail
            repo_dir=$repo_dir
            cd "\$repo_dir"

            git config --global --add safe.directory "\$repo_dir" || true

            repair_repo_permissions() {
              if ! sudo -n true >/dev/null 2>&1; then
                return 1
              fi

              sudo -n chown -R "\$(id -un):\$(id -gn)" "\$repo_dir"
              sudo -n find "\$repo_dir/.git" -type d -exec chmod u+rwx {} \;
              sudo -n find "\$repo_dir/.git" -type f -exec chmod u+rw {} \;
              sudo -n find "\$repo_dir" -path "\$repo_dir/.git" -prune -o -type d -exec chmod u+rwx {} \;
              sudo -n find "\$repo_dir" -path "\$repo_dir/.git" -prune -o -type f -exec chmod u+rw {} \;
            }

            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              if ! repair_repo_permissions; then
                echo "ERROR: passwordless sudo is required to repair repo permissions in \$repo_dir"
                exit 1
              fi
            fi
            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              echo "ERROR: git metadata is not writable by \$(id -un) in \$repo_dir"
              exit 1
            fi

            first_unwritable_path="\$(find . -path './.git' -prune -o -path './.git/*' -prune -o \( -type f -o -type d \) ! -writable -print -quit)"
            if [ -n "\$first_unwritable_path" ]; then
              if ! repair_repo_permissions; then
                echo "ERROR: passwordless sudo is required to repair repo permissions in \$repo_dir"
                exit 1
              fi
            fi
            first_unwritable_path="\$(find . -path './.git' -prune -o -path './.git/*' -prune -o \( -type f -o -type d \) ! -writable -print -quit)"
            if [ -n "\$first_unwritable_path" ]; then
              echo "ERROR: working tree contains files or directories not writable by \$(id -un) in \$repo_dir"
              ls -ld "\$first_unwritable_path" || true
              exit 1
            fi

            git -c safe.directory="\$repo_dir" fetch --prune --tags origin
            if git -c safe.directory="\$repo_dir" show-ref --verify --quiet "refs/heads/$environment"; then
              git -c safe.directory="\$repo_dir" checkout "$environment"
            else
              git -c safe.directory="\$repo_dir" checkout -B "$environment" "origin/$environment"
            fi
            git -c safe.directory="\$repo_dir" reset --hard "origin/$environment"

            if [ "$environment" = "prod" ] && [ ! -f services/nginx/nginx.prod.conf ]; then
              echo "ERROR: services/nginx/nginx.prod.conf not found in \$repo_dir"
              exit 1
            fi

            $compose_cmd pull --ignore-pull-failures
            $compose_cmd up -d --build --remove-orphans
            docker image prune -f

            docker exec "$nginx_container" nginx -s reload
          EOF

      - name: Health check
        run: |
          sleep 10
          environment="${{ steps.env.outputs.environment }}"

          if [ "$environment" = "prod" ]; then
            repo_dir="/srv/engineerfamily"
            compose_cmd="docker compose -f docker-compose.prod.yml"
          else
            repo_dir="/srv/engineerfamily-preprod"
            compose_cmd="docker compose -f docker-compose.prod.yml -f docker-compose.preprod.yml"
          fi

          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << EOF
            cd $repo_dir
            $compose_cmd ps --format "table {{.Name}}\t{{.Status}}"
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deploy failed (${{ steps.env.outputs.environment }}) on ${{ steps.target.outputs.requested_ref }}. Check logs above."
