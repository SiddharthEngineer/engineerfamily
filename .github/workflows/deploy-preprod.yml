name: Deploy → Preprod

# Trigger: push a tag like v1.2.3-preprod or v1.2.3-rc1
# Example: git tag v1.2.3-preprod && git push origin v1.2.3-preprod

on:
  push:
    tags:
      - "v*.*.*-preprod"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to deploy (e.g. main or v1.2.3-preprod)"
        required: true

jobs:
  deploy:
    name: SSH deploy to VPS (preprod)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target commit for preprod
        id: target
        run: |
          set -euo pipefail

          git fetch --prune --tags origin +refs/heads/*:refs/remotes/origin/*

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            requested_ref='${{ inputs.ref }}'
            event_mode='manual'
          else
            requested_ref='${{ github.ref_name }}'
            event_mode='tag_push'
          fi

          if [ "$event_mode" = 'tag_push' ]; then
            if ! [[ "$requested_ref" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+-preprod$ ]]; then
              echo "ERROR: tag '$requested_ref' does not match v<major>.<minor>.<patch>-preprod"
              exit 1
            fi

            release_branch="release-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            tag_commit="$(git rev-parse "refs/tags/$requested_ref^{commit}")"

            if ! git show-ref --verify --quiet "refs/remotes/origin/$release_branch"; then
              echo "ERROR: release branch origin/$release_branch not found"
              exit 1
            fi

            if ! git merge-base --is-ancestor "$tag_commit" "refs/remotes/origin/$release_branch"; then
              echo "ERROR: tag '$requested_ref' is not reachable from origin/$release_branch"
              exit 1
            fi

            target_sha="$tag_commit"
          else
            if git show-ref --verify --quiet "refs/tags/$requested_ref"; then
              target_sha="$(git rev-parse "refs/tags/$requested_ref^{commit}")"
            elif git show-ref --verify --quiet "refs/remotes/origin/$requested_ref"; then
              target_sha="$(git rev-parse "refs/remotes/origin/$requested_ref^{commit}")"
            else
              echo "ERROR: '$requested_ref' is not a known tag or branch on origin"
              exit 1
            fi
          fi

          echo "requested_ref=$requested_ref" >> "$GITHUB_OUTPUT"
          echo "target_sha=$target_sha" >> "$GITHUB_OUTPUT"

      - name: Reset origin/preprod to target
        env:
          BRANCH_RESET_TOKEN: ${{ secrets.BRANCH_RESET_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BRANCH_RESET_TOKEN:-}" ]; then
            echo "ERROR: Missing secret BRANCH_RESET_TOKEN"
            echo "Create a token with repository Contents: write and Workflows: write, then store it as BRANCH_RESET_TOKEN."
            exit 1
          fi

          git push "https://x-access-token:${BRANCH_RESET_TOKEN}@github.com/${{ github.repository }}.git" \
            "${{ steps.target.outputs.target_sha }}:refs/heads/preprod" --force

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build & restart preprod containers
        run: |
          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            set -euo pipefail
            repo_dir=/srv/engineerfamily-preprod
            cd "$repo_dir"

            git config --global --add safe.directory "$repo_dir" || true

            # Git fetch needs write access in .git/objects (not just .git itself).
            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              sudo -n chown -R "$(id -un):$(id -gn)" "$repo_dir" 2>/dev/null || true
            fi
            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              echo "ERROR: git metadata is not writable by $(id -un) in $repo_dir"
              echo "Run on VPS: sudo chown -R deploy:deploy $repo_dir && sudo find $repo_dir/.git -type d -exec chmod u+rwx {} \\; && sudo find $repo_dir/.git -type f -exec chmod u+rw {} \\;"
              exit 1
            fi

            git -c safe.directory="$repo_dir" fetch --prune --tags origin
            if git -c safe.directory="$repo_dir" show-ref --verify --quiet refs/heads/preprod; then
              git -c safe.directory="$repo_dir" checkout preprod
            else
              git -c safe.directory="$repo_dir" checkout -B preprod origin/preprod
            fi
            git -c safe.directory="$repo_dir" reset --hard origin/preprod

            docker compose \
              -f docker-compose.yml \
              -f docker-compose.preprod.yml \
              --profile preprod \
              up -d --build --remove-orphans
            docker image prune -f

            # Reload prod caddy so it picks up any Caddyfile changes
            docker exec engineerfamily-caddy-1 caddy reload --config /etc/caddy/Caddyfile
          EOF

      - name: Health check
        run: |
          sleep 10
          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            cd /srv/engineerfamily-preprod
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.preprod.yml \
              --profile preprod \
              ps --format "table {{.Name}}\t{{.Status}}"
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Preprod deploy failed on ${{ steps.target.outputs.requested_ref }}. Check logs above."
