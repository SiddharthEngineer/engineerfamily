name: Deploy → Preprod

on:
  push:
    branches:
      - preprod
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  deploy:
    name: SSH deploy to VPS (preprod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy repo to VPS (preprod directory)
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            ./ deploy@${{ secrets.VPS_HOST }}:/srv/engineerfamily-preprod/

      - name: Build & restart preprod containers
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /srv/engineerfamily-preprod
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.preprod.yml \
              --profile preprod \
              up -d --build --remove-orphans
            docker image prune -f
          EOF

      - name: Health check
        run: |
          sleep 10
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /srv/engineerfamily-preprod
            docker compose \
              -f docker-compose.yml \
              -f docker-compose.preprod.yml \
              --profile preprod \
              ps --format "table {{.Name}}\t{{.Status}}"
          EOF