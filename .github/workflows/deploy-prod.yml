name: Deploy → Production

# Trigger: push a tag like v1.2.3 (no suffix)
# Example: git tag v1.2.3 && git push origin v1.2.3

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (e.g. v1.2.3)"
        required: true

jobs:
  deploy:
    name: SSH deploy to VPS (prod)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve target commit for prod
        id: target
        run: |
          set -euo pipefail

          git fetch --prune --tags origin +refs/heads/*:refs/remotes/origin/*

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            requested_tag='${{ inputs.tag }}'
          else
            requested_tag='${{ github.ref_name }}'
          fi

          if ! [[ "$requested_tag" =~ ^v([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            echo "ERROR: tag '$requested_tag' does not match v<major>.<minor>.<patch>"
            exit 1
          fi

          release_branch="release-v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"

          if ! git show-ref --verify --quiet "refs/tags/$requested_tag"; then
            echo "ERROR: tag '$requested_tag' does not exist"
            exit 1
          fi

          if ! git show-ref --verify --quiet "refs/remotes/origin/$release_branch"; then
            echo "ERROR: release branch origin/$release_branch not found"
            exit 1
          fi

          tag_commit="$(git rev-parse "refs/tags/$requested_tag^{commit}")"
          if ! git merge-base --is-ancestor "$tag_commit" "refs/remotes/origin/$release_branch"; then
            echo "ERROR: tag '$requested_tag' is not reachable from origin/$release_branch"
            exit 1
          fi

          echo "requested_tag=$requested_tag" >> "$GITHUB_OUTPUT"
          echo "target_sha=$tag_commit" >> "$GITHUB_OUTPUT"

      - name: Reset origin/prod to tag
        env:
          BRANCH_RESET_TOKEN: ${{ secrets.BRANCH_RESET_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BRANCH_RESET_TOKEN:-}" ]; then
            echo "ERROR: Missing secret BRANCH_RESET_TOKEN"
            echo "Create a token with repository Contents: write and Workflows: write, then store it as BRANCH_RESET_TOKEN."
            exit 1
          fi

          git push "https://x-access-token:${BRANCH_RESET_TOKEN}@github.com/${{ github.repository }}.git" \
            "${{ steps.target.outputs.target_sha }}:refs/heads/prod" --force

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build & restart containers
        run: |
          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            set -euo pipefail
            repo_dir=/srv/engineerfamily
            cd "$repo_dir"

            git config --global --add safe.directory "$repo_dir" || true

            # Git fetch needs write access in .git/objects (not just .git itself).
            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              sudo -n chown -R "$(id -un):$(id -gn)" "$repo_dir" 2>/dev/null || true
            fi
            if [ ! -w .git ] || [ ! -w .git/objects ] || [ ! -w .git/objects/pack ]; then
              echo "ERROR: git metadata is not writable by $(id -un) in $repo_dir"
              echo "Run on VPS: sudo chown -R deploy:deploy $repo_dir && sudo find $repo_dir/.git -type d -exec chmod u+rwx {} \\; && sudo find $repo_dir/.git -type f -exec chmod u+rw {} \\;"
              exit 1
            fi

            git -c safe.directory="$repo_dir" fetch --prune --tags origin
            if git -c safe.directory="$repo_dir" show-ref --verify --quiet refs/heads/prod; then
              git -c safe.directory="$repo_dir" checkout prod
            else
              git -c safe.directory="$repo_dir" checkout -B prod origin/prod
            fi
            git -c safe.directory="$repo_dir" reset --hard origin/prod

            # Verify the Caddyfile made it over before restarting
            if [ ! -f services/caddy/Caddyfile ]; then
              echo "ERROR: services/caddy/Caddyfile not found in /srv/engineerfamily"
              exit 1
            fi

            docker compose pull --ignore-pull-failures
            docker compose --profile prod up -d --build --remove-orphans
            docker image prune -f
          EOF

      - name: Health check
        run: |
          sleep 10
          ssh -T deploy@${{ secrets.VPS_HOST }} bash -s << 'EOF'
            cd /srv/engineerfamily
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed on ${{ steps.target.outputs.requested_tag }}. Check logs above."
