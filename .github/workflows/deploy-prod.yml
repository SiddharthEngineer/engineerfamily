name: Deploy → Production

# Trigger: push a tag like v1.2.3 (no suffix)
# Example: git tag v1.2.3 && git push origin v1.2.3

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  deploy:
    name: SSH deploy to VPS (prod)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy repo to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            ./ deploy@${{ secrets.VPS_HOST }}:/srv/engineerfamily/

      - name: Build & restart containers
        run: |
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            cd /srv/engineerfamily
            docker compose pull --ignore-pull-failures
            docker compose --profile prod up -d --build --remove-orphans
            docker image prune -f
          EOF

      - name: Health check
        run: |
          sleep 10
          ssh deploy@${{ secrets.VPS_HOST }} << 'EOF'
            docker compose ps --format "table {{.Name}}\t{{.Status}}"
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Production deploy failed on ${{ github.ref_name }}. Check logs above."