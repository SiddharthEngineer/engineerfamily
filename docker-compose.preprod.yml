# Overrides for preprod environment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.preprod.yml --profile preprod up -d

services:
  app-preprod:
    build:
      context: .
      dockerfile: services/app/Dockerfile
      args:
        UMAMI_APP_ID: ${UMAMI_APP_ID}
    restart: unless-stopped
    environment:
      - FLASK_ENV=development
    profiles: ["preprod"]
    networks:
      web:
        aliases:
          - app-preprod

  streamlit-preprod:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - UMAMI_HOST=${UMAMI_HOST:-https://umami.engineerfamily.net}
      - UMAMI_STREAMLIT_ID=${UMAMI_STREAMLIT_ID:-}
    profiles: ["preprod"]
    networks:
      web:
        aliases:
          - streamlit-preprod

  nginx-preprod:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./services/nginx/nginx.preprod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app-preprod
    networks:
      - web
    profiles: ["preprod"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
