# Overrides for preprod environment.
# Usage: docker compose -f docker-compose.yml -f docker-compose.preprod.yml --profile preprod up -d

services:
  siddharth:
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=${SIDDHARTH_SECRET_KEY_PREPROD}
    networks:
      web:
        aliases:
          - siddharth-preprod

  nivi:
    environment:
      - NODE_ENV=development
      - url=https://nivi.preprod.engineerfamily.net
      - database__client=sqlite3
      - database__connection__filename=/var/lib/ghost/content/data/ghost-preprod.db
    networks:
      web:
        aliases:
          - nivi-preprod

  suryan:
    networks:
      web:
        aliases:
          - suryan-preprod
