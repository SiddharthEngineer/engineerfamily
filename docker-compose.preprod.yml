# Preprod stack – fully independent from the production stack.
# Usage: docker compose -f docker-compose.base.yml -f docker-compose.preprod.yml up -d

services:
  # ─── Edge Router (nginx) ─────────────────────────────────
  nginx-preprod:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./services/nginx/nginx.preprod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      - app-preprod
      - umami-preprod
      - streamlit-preprod
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ─── Home Page ──────────────────────────────────────────
  app-preprod:
    build:
      context: .
      dockerfile: services/app/Dockerfile
      args:
        UMAMI_APP_ID: ${UMAMI_APP_ID}
        UMAMI_HOST: ${UMAMI_HOST:-https://umami.engineerfamily.net}
    restart: unless-stopped
    environment:
      - FLASK_ENV=development
    networks:
      web:
        aliases:
          - app-preprod

  # ─── Streamlit ────────────────────────────────────────
  streamlit-preprod:
    build:
      context: ./services/streamlit
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - UMAMI_HOST=${UMAMI_HOST:-https://umami.engineerfamily.net}
      - UMAMI_STREAMLIT_ID=${UMAMI_STREAMLIT_ID:-}
    networks:
      web:
        aliases:
          - streamlit-preprod

  # ─── Analytics (Umami – self-hosted, privacy-first) ───────────────────────
  umami-preprod:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://umami:${UMAMI_DB_PASSWORD_PREPROD}@analytics-db-preprod:5432/umami
      - APP_SECRET=${UMAMI_APP_SECRET_PREPROD}
    depends_on:
      analytics-db-preprod:
        condition: service_healthy
    networks:
      - web

  analytics-db-preprod:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD_PREPROD}
    volumes:
      - analytics_db_preprod:/var/lib/postgresql/data
    networks:
      - web
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  analytics_db_preprod:
