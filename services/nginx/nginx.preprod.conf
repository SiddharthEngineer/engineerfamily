resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    listen [::]:80;
    server_name preprod.engineerfamily.net;

    location / {
        auth_basic "Preprod";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $upstream_app_preprod http://app-preprod:8000;
        proxy_pass $upstream_app_preprod;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name umami-preprod.engineerfamily.net;

    location / {
        set $upstream_umami_preprod http://umami-preprod:3000;
